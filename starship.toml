"$schema" = 'https://starship.rs/config-schema.json'

format = """
[](color_red)\
$os\
$username\
[](bg:color_yellow fg:color_red)\
$directory\
[](fg:color_yellow bg:color_green)\
$git_branch\
$git_status\
[](fg:color_green bg:color_blue)\
$python\
$c\
$cpp\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
[](fg:color_blue bg:color_white)\
$docker_context\
[](fg:color_white bg:color_magenta)\
$time\
[](fg:color_magenta)
$character
"""

# Disable the blank line at the start of the prompt
add_newline = false

palette = "srcery"

[palettes.srcery]
color_black = "#1c1b19"
color_red = "#ef2f27"
color_orange = "#ff5f00"
color_green = "#519f50"
color_yellow = "#fbb829"
color_blue = "#2c78bf"
color_magenta = "#e02c6d"
color_cyan = "#0aaeb3"
color_teal = "#008080"
color_white = "#baa67f"
color_brightblack = "#918175"
color_brightred = "#f75341"
color_brightorange = "#ff8700"
color_brightgreen = "#98bc37"
color_brightyellow = "#fed06e"
color_brightblue = "#68a8e4"
color_brightmagenta = "#ff5c8f"
color_brightcyan = "#2be4d0"
color_brightwhite = "#fce8c3"
color_gray = "#262626"

# You can also replace your username with a neat symbol like   or disable this
# and use the os module below
[username]
show_always = true
style_user = "bg:color_red"
style_root = "bg:color_red"
format = '[$user ]($style)'
disabled = false

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "bg:color_red"
disabled = true # Disabled by default

[directory]
style = "bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = ""

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "
# Keep in mind that the order matters. For example:
# "Important Documents" = " 󰈙 "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important 󰈙 " = " 󰈙 "

[python]
symbol = ""
style = "bg:color_blue"
format = "[ $symbol $virtualenv ]($style)"

[c]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[cpp]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[docker_context]
symbol = " "
style = "bg:color_white"
format = '[ $symbol $context ]($style)'

[elixir]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[git_branch]
symbol = ""
style = "bg:color_green"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:color_green"
format = '[$all_status$ahead_behind ]($style)'

[golang]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:color_blue"
format = '[ $symbol ($version) ]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:color_magenta"
format = '[ ⌛ $time ]($style)'